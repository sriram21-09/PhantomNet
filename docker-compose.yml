services:
  postgres:
    image: postgres:15-alpine
    container_name: phantomnet_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-phantomnet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
      - honeypot_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  ssh_honeypot:
    build:
      context: .
      dockerfile: backend/honeypots/ssh/Dockerfile
    container_name: phantomnet_ssh
    ports:
      - "2222:2222"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-phantomnet}
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-phantomnet}
      DB_PORT: 5432
    volumes:
      - ./backend/logs:/logs
    networks:
      - app_net
      - honeypot_net
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  http_honeypot:
    build:
      context: .
      dockerfile: backend/honeypots/http/Dockerfile
    container_name: phantomnet_http
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-phantomnet}
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-phantomnet}
      DB_PORT: 5432
    volumes:
      - ./backend/logs:/logs
    networks:
      - app_net
      - honeypot_net
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  ftp_honeypot:
    build:
      context: .
      dockerfile: backend/honeypots/ftp/Dockerfile
    container_name: phantomnet_ftp
    ports:
      - "2121:2121"
      - "30000-30020:30000-30020"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-phantomnet}
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-phantomnet}
      DB_PORT: 5432
    volumes:
      - ./backend/logs:/logs
    networks:
      - app_net
      - honeypot_net
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  smtp-honeypot:
    build:
      context: .
      dockerfile: backend/honeypots/smtp/Dockerfile
    container_name: phantomnet_smtp
    ports:
      - "2525:2525"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-phantomnet}
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-phantomnet}
      DB_PORT: 5432
    volumes:
      - ./backend/logs:/logs
    networks:
      - app_net
      - honeypot_net
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  frontend:
    build:
      context: ./frontend-dev/phantomnet-dashboard
      dockerfile: Dockerfile
    container_name: phantomnet_frontend
    ports:
      - "3000:8080"
    networks:
      - app_net
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    container_name: phantomnet_api
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-phantomnet}
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-phantomnet}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      API_KEY: ${API_KEY:-default_key}
      SENTINEL_LLM_HOST: ${SENTINEL_LLM_HOST:-http://ollama:11434}
      SENTINEL_LLM_MODEL: ${SENTINEL_LLM_MODEL:-mistral}
      SENTINEL_LLM_ENABLED: ${SENTINEL_LLM_ENABLED:-false}
    networks:
      - app_net
      - honeypot_net
    depends_on:
      - postgres
      - ollama
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  ollama:
    image: ollama/ollama:latest
    container_name: phantomnet_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app_net
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  app_net:
    driver: bridge
  honeypot_net:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  ollama_data:
