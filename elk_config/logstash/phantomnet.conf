# ═══════════════════════════════════════════════════════════════════════════
# PhantomNet — Logstash Pipeline Configuration
# ═══════════════════════════════════════════════════════════════════════════
#
# File:   /etc/logstash/conf.d/phantomnet.conf
# Desc:   Ingests PhantomNet security events over HTTP, enriches with GeoIP,
#         and indexes into Elasticsearch.
#
# Deploy: Copy this file to /etc/logstash/conf.d/ and restart Logstash.
#         sudo systemctl restart logstash
# ═══════════════════════════════════════════════════════════════════════════

input {
  http {
    port              => 5044
    codec             => json
    threads           => 4
    additional_codecs  => { "application/json" => "json" }

    # Optional: restrict to trusted PhantomNet backend IPs
    # host => "0.0.0.0"
  }
}

# ─────────────────────────────────────────────────────────────────────────
# Filters
# ─────────────────────────────────────────────────────────────────────────

filter {

  # ── 1. Parse timestamp ────────────────────────────────────────────────
  date {
    match     => [ "timestamp", "ISO8601" ]
    target    => "@timestamp"
    timezone  => "UTC"
  }

  # ── 2. GeoIP enrichment from source IP ────────────────────────────────
  if [src_ip] {
    geoip {
      source   => "src_ip"
      target   => "geoip"
      database => "/usr/share/GeoIP/GeoLite2-City.mmdb"
      fields   => [
        "city_name", "country_name", "country_code2",
        "continent_code", "region_name",
        "latitude", "longitude", "location"
      ]
    }
  }

  # ── 3. Threat-level tagging ───────────────────────────────────────────
  if [threat_level] == "CRITICAL" {
    mutate { add_tag => [ "critical", "alert" ] }
  } else if [threat_level] == "HIGH" {
    mutate { add_tag => [ "high_threat" ] }
  } else if [threat_level] == "MEDIUM" {
    mutate { add_tag => [ "medium_threat" ] }
  }

  # ── 4. Flag malicious events ──────────────────────────────────────────
  if [is_malicious] == true {
    mutate { add_tag => [ "malicious" ] }
  }

  # ── 5. Normalize protocol to uppercase ────────────────────────────────
  if [protocol] {
    mutate { uppercase => [ "protocol" ] }
  }

  # ── 6. Remove internal/transient fields ───────────────────────────────
  mutate {
    remove_field => [ "headers", "host" ]
  }

  # ── 7. Convert numeric fields ─────────────────────────────────────────
  mutate {
    convert => {
      "threat_score" => "float"
      "confidence"   => "float"
      "src_port"     => "integer"
      "dst_port"     => "integer"
      "length"       => "integer"
    }
  }
}

# ─────────────────────────────────────────────────────────────────────────
# Output — Elasticsearch
# ─────────────────────────────────────────────────────────────────────────

output {

  elasticsearch {
    hosts           => [ "https://localhost:9200" ]
    index           => "phantomnet-events-%{+YYYY.MM.dd}"
    user            => "${ES_USER:elastic}"
    password        => "${ES_PASSWORD:changeme}"
    ssl_enabled     => true
    ssl_certificate_verification => false    # adjust for production CA

    # ILM (Index Lifecycle Management) — optional
    ilm_enabled     => true
    ilm_rollover_alias => "phantomnet-events"
    ilm_pattern     => "{now/d}-000001"
    ilm_policy      => "phantomnet-ilm-policy"
  }

  # Debug: uncomment to log processed events to stdout
  # stdout { codec => rubydebug }
}
